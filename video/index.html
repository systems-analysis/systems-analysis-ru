        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function matchesSearch(video, query) {
            if (!query) return true;
            const topicText = TOPIC_LABELS[video.topic] || '';
            const haystack = `${video.title} ${video.desc} ${topicText}`.toLowerCase();
            return haystack.includes(query);
        }

        function renderVideos(list) {
            const grid = document.getElementById('videoGrid');

            if (!list.length) {
                grid.innerHTML = `
                    <div class="col-span-full bg-zinc-900 border border-zinc-800 rounded-3xl p-10 text-center text-zinc-400">
                        Ничего не найдено
                    </div>
                `;
                return;
            }

            grid.innerHTML = list.map(video => {
                const topicBadge = `
                    <span class="px-3 py-1 rounded-2xl border border-zinc-700 bg-zinc-950 text-[11px] font-medium text-zinc-300">${escapeHtml(TOPIC_LABELS[video.topic] || '')}</span>
                `;

                return `
                    <article class="video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden group">
                        <a href="${escapeHtml(video.url)}" target="_blank" rel="noopener noreferrer" class="block thumbnail-container">
                            <img
                                src="${escapeHtml(video.thumbnail)}"
                                alt="${escapeHtml(video.title)}"
                                class="w-full aspect-video object-cover"
                                loading="lazy"
                                onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${video.id}/hqdefault.jpg';"
                            >
                            <div class="duration">${escapeHtml(video.duration)}</div>
                        </a>
                        <div class="p-5">
                            <a href="${escapeHtml(video.url)}" target="_blank" rel="noopener noreferrer" class="block">
                                <h3 class="font-semibold text-lg leading-tight mb-3 line-clamp-2 group-hover:text-emerald-400 transition-colors">${escapeHtml(video.title)}</h3>
                            </a>
                            <p class="text-zinc-400 text-sm line-clamp-3 mb-4">${escapeHtml(video.desc)}</p>
                            <div class="flex flex-wrap gap-2 mb-4">${topicBadge}</div>
                            <div class="text-xs text-zinc-500">${escapeHtml(video.published)}</div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function filterAndSort() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const mode = document.getElementById('modeSelect').value;

            let list = videos.filter(video => matchesSearch(video, query));
            let sortMode = 'newest';

            if (mode === 'sort:oldest') {
                sortMode = 'oldest';
            } else if (mode.startsWith('topic:')) {
                const topic = mode.split(':')[1];
                list = list.filter(video => video.topic === topic);
            }

            list.sort((a, b) => sortMode === 'oldest' ? a.timestamp - b.timestamp : b.timestamp - a.timestamp);
            renderVideos(list);
        }

        document.getElementById('searchInput').addEventListener('input', filterAndSort);
        document.getElementById('modeSelect').addEventListener('change', filterAndSort);
        window.addEventListener('DOMContentLoaded', filterAndSort);
    </script>
